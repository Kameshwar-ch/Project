<div class="sf-auth-page">
  <div class="sf-blob sf-blob-1"></div>
  <div class="sf-blob sf-blob-2"></div>

  <button class="sf-auth-theme-btn" type="button" (click)="theme.toggle()">
    <i class="bi" [ngClass]="theme.theme() === 'dark' ? 'bi-sun' : 'bi-moon'"></i>
  </button>

  <div class="sf-auth-card fade-in">
    <div class="text-center mb-4">
      <div class="sf-logo-badge mx-auto mb-3" style="width:48px;height:48px;border-radius:14px;"></div>
      <h1 class="fw-bold fs-3 mb-1">Reset Password</h1>
      <p class="sf-muted small">
        {{ step() === 'email' ? 'Enter your email to receive reset instructions.' : 'Enter your new password.' }}
      </p>
    </div>

    @if (success()) {
      <div class="alert alert-success d-flex gap-2 align-items-center py-2 small">
        <i class="bi bi-check-circle-fill"></i>{{ success() }}
      </div>
      <a routerLink="/login" class="sf-btn-primary w-100 mt-3 d-block text-center text-decoration-none">Back to Sign In</a>
    } @else {

      @if (error()) {
        <div class="alert alert-danger d-flex gap-2 align-items-center py-2 small">
          <i class="bi bi-exclamation-triangle-fill"></i>{{ error() }}
        </div>
      }

      @if (step() === 'email') {
        <form [formGroup]="emailForm" (ngSubmit)="submitEmail()" novalidate>
          <div class="mb-4">
            <label class="sf-label">Email address</label>
            <div class="sf-input-group">
              <span class="sf-input-icon"><i class="bi bi-envelope"></i></span>
              <input type="email" class="sf-input" formControlName="email" placeholder="you@company.com" />
            </div>
          </div>
          <button type="submit" class="sf-btn-primary w-100" [disabled]="loading()">
            @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
            Send Reset Link
          </button>
        </form>
      } @else {
        <form [formGroup]="resetForm" (ngSubmit)="submitReset()" novalidate>
          <div class="mb-3">
            <label class="sf-label">Email address</label>
            <input type="email" class="sf-input w-100" formControlName="email" readonly />
          </div>
          <div class="mb-4">
            <label class="sf-label">New Password</label>
            <div class="sf-input-group">
              <span class="sf-input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" class="sf-input" formControlName="newPassword" placeholder="min. 6 characters" />
            </div>
          </div>
          <div class="mb-4">
            <label class="sf-label">Confirm Password</label>
            <div class="sf-input-group">
              <span class="sf-input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" class="sf-input" formControlName="confirmPassword" placeholder="re-enter password" />
            </div>
          </div>
          <button type="submit" class="sf-btn-primary w-100" [disabled]="loading()">
            @if (loading()) { <span class="spinner-border spinner-border-sm me-2"></span> }
            Reset Password
          </button>
        </form>
      }
    }

    <p class="text-center small sf-muted mt-4 mb-0">
      <a routerLink="/login" class="sf-link"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
    </p>
  </div>
</div>
